<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Apple Music DL</title>
<style>
  :root { --accent: #fa233b; }
  * { box-sizing: border-box; }
  body { font: 14px -apple-system, system-ui, sans-serif; padding: 24px; max-width: 760px; margin: 0 auto; color: #222; }
  h1 { margin: 0 0 16px; font-size: 20px; }
  h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .04em; color: #888; margin: 22px 0 8px; }
  .row { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
  input[type=text], input[type=url] { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 6px; font: inherit; }
  button { padding: 8px 14px; border: 0; border-radius: 6px; background: var(--accent); color: #fff; cursor: pointer; font: inherit; }
  button.secondary { background: #eee; color: #333; }
  button.small { padding: 5px 10px; font-size: 12px; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  label { display: flex; align-items: center; gap: 6px; white-space: nowrap; }

  .auth { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; padding: 8px 12px; background: #f6f6f6; border-radius: 6px; }
  .auth-state { flex: 1; }

  .hint { color: #999; font-size: 12px; padding: 8px 2px; }

  /* search results */
  #results { border: 1px solid #eee; border-radius: 8px; overflow: hidden; }
  #results:empty { display: none; }
  .res { display: flex; align-items: center; gap: 12px; padding: 8px 12px; border-top: 1px solid #f0f0f0; }
  .res:first-child { border-top: 0; }
  .res img { width: 44px; height: 44px; border-radius: 5px; object-fit: cover; background: #eee; flex: 0 0 auto; }
  .res .meta { flex: 1; min-width: 0; }
  .res .title { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .res .sub { color: #888; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .badge { font-size: 10px; text-transform: uppercase; letter-spacing: .05em; padding: 2px 6px; border-radius: 4px; background: #eef; color: #55c; flex: 0 0 auto; }
  .badge.album { background: #fee; color: var(--accent); }

  /* queue */
  #queue:empty { display: none; }
  #queue:empty + .queue-empty { display: block; }
  .queue-empty { display: none; }
  .qitem { border: 1px solid #eee; border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; }
  .qitem .qhead { display: flex; align-items: center; gap: 10px; }
  .qitem .qtitle { flex: 1; min-width: 0; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .qstatus { font-size: 12px; padding: 2px 8px; border-radius: 10px; background: #eee; color: #666; flex: 0 0 auto; }
  .qstatus.downloading { background: #fff3cd; color: #8a6d3b; }
  .qstatus.done { background: #e3f6ec; color: #0a7; }
  .qstatus.error { background: #fdecea; color: #c33; }
  .qtracks { margin-top: 6px; font-size: 12px; color: #777; font-family: ui-monospace, monospace; max-height: 120px; overflow-y: auto; }
  .qtracks .err { color: #c33; }
  .qtracks .muted { color: #aaa; }

  /* log */
  .log-bar { display: flex; align-items: center; gap: 6px; }
  .log-bar h2 { flex: 1; margin: 0; }
  #log { border: 1px solid #eee; border-radius: 6px; padding: 12px; height: 150px; overflow-y: auto; font-family: ui-monospace, monospace; font-size: 12px;
         user-select: text; -webkit-user-select: text; cursor: text; white-space: pre-wrap; margin-top: 8px; }
  .ok { color: #0a7; }
  .err { color: #c33; }
  .muted { color: #999; }
  .spin { display: inline-block; }
</style>
</head>
<body>
  <h1>Apple Music DL</h1>

  <div class="auth">
    <span class="auth-state" id="authState">Checking…</span>
    <label><input type="checkbox" id="mp3" checked> MP3 (256 kbps)</label>
    <button id="loginBtn" class="secondary">Sign in</button>
    <button id="logoutBtn" class="secondary" hidden>Sign out</button>
  </div>

  <div class="row">
    <input id="search" type="text" placeholder="Search songs &amp; albums…" autocomplete="off">
    <button id="searchBtn" disabled>Search</button>
  </div>
  <div id="results"></div>

  <div class="row" style="margin-top:12px">
    <input id="url" type="url" placeholder="…or paste an Apple Music song / album URL">
    <button id="addUrlBtn" class="secondary" disabled>Add to queue</button>
  </div>

  <h2>Queue</h2>
  <div id="queue"></div>
  <div class="queue-empty hint">Nothing queued yet. Search or paste a URL, then add it here.</div>

  <div class="log-bar" style="margin-top:22px">
    <h2>Log</h2>
    <button id="copyBtn" class="secondary small">Copy</button>
    <button id="clearBtn" class="secondary small">Clear</button>
  </div>
  <div id="log"></div>

  <script src="app.js"></script>
</body>
</html>
