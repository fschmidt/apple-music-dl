<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Apple Music DL</title>
<style>
  body { font: 14px -apple-system, system-ui, sans-serif; padding: 24px; max-width: 640px; margin: 0 auto; color: #222; }
  h1 { margin: 0 0 16px; font-size: 20px; }
  .row { display: flex; gap: 8px; margin-bottom: 12px; }
  input[type=url] { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 6px; }
  button { padding: 8px 14px; border: 0; border-radius: 6px; background: #fa233b; color: #fff; cursor: pointer; }
  button.secondary { background: #eee; color: #333; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  label { display: flex; align-items: center; gap: 6px; }
  .log-wrap { margin-top: 16px; }
  .log-bar { display: flex; justify-content: flex-end; margin-bottom: 6px; }
  .log-bar button { padding: 4px 10px; font-size: 12px; }
  #log { border: 1px solid #eee; border-radius: 6px; padding: 12px; height: 280px; overflow-y: auto; font-family: ui-monospace, monospace; font-size: 12px;
         user-select: text; -webkit-user-select: text; cursor: text; white-space: pre-wrap; }
  .ok { color: #0a7; }
  .err { color: #c33; }
  .muted { color: #999; }
  .auth { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; padding: 8px 12px; background: #f6f6f6; border-radius: 6px; }
  .auth-state { flex: 1; }
</style>
</head>
<body>
  <h1>Apple Music DL</h1>

  <div class="auth">
    <span class="auth-state" id="authState">Checking…</span>
    <button id="loginBtn" class="secondary">Sign in</button>
    <button id="logoutBtn" class="secondary" hidden>Sign out</button>
  </div>

  <div class="row">
    <input id="url" type="url" placeholder="Paste an Apple Music song or album URL">
  </div>
  <div class="row">
    <label><input type="checkbox" id="mp3" checked> Convert to MP3 (256 kbps)</label>
    <div style="flex:1"></div>
    <button id="dlBtn" disabled>Download</button>
  </div>

  <div class="log-wrap">
    <div class="log-bar">
      <button id="copyBtn" class="secondary">Copy logs</button>
      <button id="clearBtn" class="secondary" style="margin-left:6px">Clear</button>
    </div>
    <div id="log"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
